<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Korku Oyunu - Developer Burak</title>
    <style>
        body, html { 
            margin: 0; padding: 0; background: #000; overflow: hidden; 
            width: 100%; height: 100%; font-family: sans-serif; 
            user-select: none; -webkit-user-select: none; touch-action: none; 
        }
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; object-fit: cover; }
        
        #dev-tag { 
            position: absolute; top: 15px; left: 15px; color: #fff; 
            background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; 
            font-size: 14px; border: 1px solid #1abc9c; z-index: 10;
        }
        
        #door-btn { 
            position: absolute; bottom: 30px; right: 30px; width: 85px; height: 85px; 
            background: rgba(0, 0, 0, 0.7); border: 3px solid #fff; border-radius: 50%; 
            color: white; display: none; justify-content: center; align-items: center; 
            cursor: pointer; font-weight: bold; z-index: 10;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); font-size: 18px;
        }

        #joystick-area {
            position: absolute; bottom: 40px; left: 40px; width: 130px; height: 130px;
            background: rgba(255, 255, 255, 0.05); border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2); z-index: 10;
            display: flex; justify-content: center; align-items: center;
        }
        #joystick-stick {
            width: 60px; height: 60px; background: rgba(255, 255, 255, 0.5);
            border-radius: 50%; position: absolute; pointer-events: none; 
        }
        /* Bilgisayarda joystick'i gizle */
        @media (pointer: fine) { #joystick-area { display: none; } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="dev-tag">Developer Burak</div>
    <canvas id="gameCanvas"></canvas>
    <div id="joystick-area"><div id="joystick-stick"></div></div>
    <div id="door-btn" onclick="toggleMap()">KAPI</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const doorBtn = document.getElementById('door-btn');

// Dahili çözünürlük sabittir, CSS ile ekrana sığdırılır. Bu çarpışma koordinatlarını kolaylaştırır.
const GAME_WIDTH = 1000;
const GAME_HEIGHT = 750;

function resizeCanvas() {
    canvas.width = GAME_WIDTH;
    canvas.height = GAME_HEIGHT;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Oyun Durumu
let currentMap = 'outside'; 
let player = {
    x: GAME_WIDTH / 2 - 20, // Başlangıç pozisyonu
    y: GAME_HEIGHT / 2 + 100,
    speed: 5,
    width: 40, height: 40, // Küçültülmüş boyut
    direction: 'down',
    isMoving: false
};
let moveVector = { x: 0, y: 0 };

// --- GÖRSELLER ---
const images = {
    maps: {
        outside: 'https://i.ibb.co/9kYVv8HF/MG-20260513-WA0001.jpg',
        inside: 'https://i.ibb.co/jZLz5d4X/MG-20260513-WA0000.jpg'
    },
    sprites: {
        stand_back: 'https://i.ibb.co/YBmnvKR0/1778341855649-1.jpg', stand_front: 'https://i.ibb.co/HDfvc589/1778341855649-2.jpg',
        stand_right: 'https://i.ibb.co/bRFJ8XkZ/1778341855649-3.jpg', stand_left: 'https://i.ibb.co/NgVq4cQB/1778341855649-4.jpg',
        walk_back: 'https://i.ibb.co/pBV1FvL2/1778341855649-5.jpg', walk_front: 'https://i.ibb.co/ZRzhXFr8/1778341855649-6.jpg',
        walk_right: 'https://i.ibb.co/nq0LFGgd/1778341855649-7.jpg', walk_left: 'https://i.ibb.co/3ZwvfRY/1778341855649-8.jpg'
    }
};
const loadedImages = {};
function preload() {
    for (let key in images.maps) { let img = new Image(); img.src = images.maps[key]; loadedImages[key] = img; }
    for (let key in images.sprites) { let img = new Image(); img.src = images.sprites[key]; loadedImages[key] = img; }
}
preload();

// --- FİZİK VE ÇARPIŞMA (COLLISION) ---

// İki dikdörtgenin çarpışıp çarpışmadığını kontrol eder
function rectIntersect(r1, r2) {
    return !(r2.x > r1.x + r1.width || 
             r2.x + r2.width < r1.x || 
             r2.y > r1.y + r1.height || 
             r2.y + r2.height < r1.y);
}

// Haritalardaki engelleri tanımla (x, y, width, height)
// Bu koordinatlar sabittir (1000x750 çözünürlüğe göre).
const obstacles = {
    outside: [
        // Ev (Ortadaki büyük bina, kapıyı boş bıraktım)
        { x: 380, y: 150, width: 240, height: 250 }, // Evin ana gövdesi
        
        // Taşlar ve Çevre Engelleri (Resimdeki yerlerine göre tahmini)
        { x: 50,  y: 500, width: 150, height: 150 }, // Sol alttaki büyük taş
        { x: 150, y: 100, width: 120, height: 120 }, // Sol üstteki taş
        { x: 800, y: 150, width: 100, height: 100 }, // Sağ üstteki taş
        { x: 750, y: 450, width: 180, height: 180 }, // Sağ ortadaki taş/çalı grubu
        { x: 0,   y: 0,   width: 1000, height: 50  }, // Üst sınır
        { x: 0,   y: 700, width: 1000, height: 50  }  // Alt sınır
    ],
    inside: [
        // Hallway duvarları (Sadece ortadaki koridor yürünebilir)
        { x: 0,   y: 0,   width: 350,  height: 750 }, // Sol duvar
        { x: 650, y: 0,   width: 350,  height: 750 }, // Sağ duvar
        { x: 350, y: 0,   width: 300,  height: 100 }  // Koridorun sonundaki duvar
    ]
};

// --- KONTROLLER ---
// Bilgisayar (WASD)
const keys = { w:false, a:false, s:false, d:false, ArrowUp:false, ArrowDown:false, ArrowLeft:false, ArrowRight:false };
window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key)){ keys[e.key]=true; updateKeyboardMove(); }});
window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)){ keys[e.key]=false; updateKeyboardMove(); }});

function updateKeyboardMove() {
    if (isJoystickDragging) return;
    let dx = 0, dy = 0;
    if (keys.w || keys.ArrowUp) dy = -1; if (keys.s || keys.ArrowDown) dy = 1;
    if (keys.a || keys.ArrowLeft) dx = -1; if (keys.d || keys.ArrowRight) dx = 1;
    if (dx!==0 || dy!==0) {
        player.isMoving = true;
        let len = Math.hypot(dx, dy); moveVector.x = dx/len; moveVector.y = dy/len;
        if (Math.abs(dx) > Math.abs(dy)) player.direction = dx>0 ? 'right' : 'left';
        else player.direction = dy>0 ? 'down' : 'up';
    } else { player.isMoving = false; moveVector={x:0,y:0}; }
}

// Mobil (Joystick)
const joyArea = document.getElementById('joystick-area');
const joyStick = document.getElementById('joystick-stick');
let isJoystickDragging = false;
let joyCenter = { x: 0, y: 0 };

joyArea.addEventListener('touchstart', startDrag, {passive: false});
joyArea.addEventListener('touchmove', drag, {passive: false});
window.addEventListener('touchend', endDrag);

function startDrag(e) { e.preventDefault(); isJoystickDragging = true; let r = joyArea.getBoundingClientRect(); joyCenter = { x: r.left + r.width/2, y: r.top + r.height/2 }; drag(e); }
function drag(e) {
    if (!isJoystickDragging) return; e.preventDefault();
    let t = e.touches[0]; let dx = t.clientX - joyCenter.x; let dy = t.clientY - joyCenter.y;
    let dist = Math.hypot(dx, dy); let maxDist = joyArea.clientWidth / 2;
    if (dist > maxDist) { dx *= maxDist/dist; dy *= maxDist/dist; dist = maxDist; }
    joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
    moveVector.x = dx / maxDist; moveVector.y = dy / maxDist;
    player.isMoving = true;
    if (Math.abs(dx) > Math.abs(dy)) player.direction = dx>0 ? 'right' : 'left';
    else player.direction = dy>0 ? 'down' : 'up';
}
function endDrag() { isJoystickDragging = false; joyStick.style.transform = `translate(0px, 0px)`; moveVector={x:0,y:0}; player.isMoving = false; updateKeyboardMove(); }

// --- HARİTA GEÇİŞİ VE KAPI MANTIĞI ---
function toggleMap() {
    if (currentMap === 'outside') {
        currentMap = 'inside';
        // İçeri girince kapının biraz ilerisinde doğ (bug'ı önler)
        player.x = GAME_WIDTH / 2 - player.width / 2; 
        player.y = GAME_HEIGHT - 200; // Kapıdan uzakta
        player.direction = 'up';
    } else {
        currentMap = 'outside';
        // Dışarı çıkınca kapı önünde ama engelin dışında doğ
        player.x = GAME_WIDTH / 2 - player.width / 2; 
        player.y = 420; // Evin engel alanının hemen altı
        player.direction = 'down';
    }
    doorBtn.style.display = 'none'; 
}

// --- ANA DÖNGÜ ---
function update() {
    if (player.isMoving) {
        // Çarpışma kontrollü hareket
        let nextX = player.x + moveVector.x * player.speed;
        let nextY = player.y + moveVector.y * player.speed;
        
        let collisionX = false;
        let collisionY = false;

        // Ekran sınırları kontrolü
        if (nextX < 0 || nextX > GAME_WIDTH - player.width) collisionX = true;
        if (nextY < 0 || nextY > GAME_HEIGHT - player.height) collisionY = true;

        // Engel kontrolü
        let currentObstacles = obstacles[currentMap];
        let playerRect = { x: nextX, y: player.y, width: player.width, height: player.height }; // Sadece X değişimi

        // X ekseni kontrolü
        for (let obs of currentObstacles) {
            if (rectIntersect(playerRect, obs)) { collisionX = true; break; }
        }
        if (!collisionX) player.x = nextX;

        // Y ekseni kontrolü (Sürme hissi için ayrı kontrol)
        playerRect = { x: player.x, y: nextY, width: player.width, height: player.height }; // Güncellenmiş X ile Y değişimi
        for (let obs of currentObstacles) {
            if (rectIntersect(playerRect, obs)) { collisionY = true; break; }
        }
        if (!collisionY) player.y = nextY;
    }

    // Kapı Butonu Mantığı
    let nearDoor = false;
    if (currentMap === 'outside') {
        // Dışarıda evin kapısına yaklaşıldığında (x ortada, y yukarıda)
        if (player.x > 450 && player.x < 550 && player.y > 380 && player.y < 420) nearDoor = true;
    } else {
        // İçeride kapıya (aşağıya) iyice yaklaşıldığında
        if (player.y > GAME_HEIGHT - 80) nearDoor = true; // Sadece kapıya gitmediğimizde çıkmaz
    }
    doorBtn.style.display = nearDoor ? 'flex' : 'none';
}

function draw() {
    ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    
    // Harita
    if (loadedImages[currentMap]) ctx.drawImage(loadedImages[currentMap], 0, 0, GAME_WIDTH, GAME_HEIGHT);

    // Engelleri Çiz (Hata ayıklama için, oyun bitince yorum satırı yapabilirsin)
    /*
    ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
    for (let obs of obstacles[currentMap]) ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
    */

    // Karakter
    let spriteKey = (player.isMoving ? 'walk_' : 'stand_') + (player.direction==='up'?'back':player.direction==='down'?'front':player.direction);
    if (loadedImages[spriteKey]) ctx.drawImage(loadedImages[spriteKey], player.x, player.y, player.width, player.height);

    requestAnimationFrame(() => { update(); draw(); });
}

window.onload = draw;
</script>

</body>
</html>
