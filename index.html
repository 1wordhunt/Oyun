<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Tree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Görseldeki gibi yukarıdan aşağıya doğru açılan gradyan arka plan */
            background: linear-gradient(180deg, #2b9393 0%, #114565 50%, #07162c 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: white;
        }

        /* Üst Başlık Alanı */
        .header-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-title {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Kutuların Toplandığı Ana Alan */
        .links-container {
            width: 100%;
            max-width: 520px; /* Mobil ve web için ideal ekran genişliği */
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Link Kutusu Tasarımı */
        .link-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* Kutuya dokununca veya mouse ile üzerine gelince efekt */
        .link-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* ImgBB'den Gelecek Resim Alanı */
        .card-img {
            width: 65px;
            height: 65px;
            border-radius: 8px;
            object-fit: cover; /* Resmin kutuya tam sığmasını ve bozulmamasını sağlar */
            background-color: rgba(255, 255, 255, 0.1); /* Resim linki yokken boş duracak alan */
            flex-shrink: 0;
        }

        /* Ortadaki Yazı Alanı */
        .card-text {
            flex-grow: 1;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
            padding: 0 15px;
        }

        /* Sağ taraftaki Üç Nokta Seçenek Simgesi */
        .card-options {
            font-size: 1.2rem;
            opacity: 0.5;
            padding-right: 5px;
        }
    </style>
</head>
<body>

    <div class="header-area">
        <h1 class="header-title">God Level ♀ 👁</h1>
    </div>

    <div class="links-container">

        <a href="GİDİLECEK_SİTE_LİNKİ_1" target="_blank" class="link-card">
            <img class="card-img" src="IMGBB_RESİM_LİNKİ_BURAYA_1" alt="">
            <div class="card-text">Kutu Metni 1</div>
            <div class="card-options">⋮</div>
        </a>

        <a href="GİDİLECEK_SİTE_LİNKİ_2" target="_blank" class="link-card">
            <img class="card-img" src="IMGBB_RESİM_LİNKİ_BURAYA_2" alt="">
            <div class="card-text">Kutu Metni 2</div>
            <div class="card-options">⋮</div>
        </a>

        <a href="GİDİLECEK_SİTE_LİNKİ_3" target="_blank" class="link-card">
            <img class="card-img" src="IMGBB_RESİM_LİNKİ_BURAYA_3" alt="">
            <div class="card-text">Kutu Metni 3</div>
            <div class="card-options">⋮</div>
        </a>

        <a href="GİDİLECEK_SİTE_LİNKİ_4" target="_blank" class="link-card">
            <img class="card-img" src="IMGBB_RESİM_LİNKİ_BURAYA_4" alt="">
            <div class="card-text">Kutu Metni 4</div>
            <div class="card-options">⋮</div>
        </a>

    </div>

</body>
</html>
