<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Korku Oyunu - Dev</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { background: #222; border: 2px solid #444; max-width: 100%; max-height: 100%; }
        
        /* UI Elemanları */
        #dev-tag { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; font-size: 14px; border: 1px solid #1abc9c; }
        #door-btn { 
            position: absolute; bottom: 20px; right: 20px; width: 80px; height: 80px; 
            background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; 
            color: white; display: none; justify-content: center; align-items: center; 
            cursor: pointer; font-weight: bold; z-index: 10;
        }
        
        /* Kontrol Tuşları (Mobil için) */
        .controls { position: absolute; bottom: 20px; left: 20px; display: grid; grid-template-columns: repeat(3, 50px); grid-gap: 5px; }
        .ctrl { width: 50px; height: 50px; background: rgba(255,255,255,0.2); border: 1px solid #fff; border-radius: 5px; display: flex; justify-content: center; align-items: center; color: white; user-select: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="dev-tag">Developer Harun Sürücü</div>
    <canvas id="gameCanvas"></canvas>
    <div id="door-btn" onclick="toggleMap()">KAPI</div>

    <div class="controls">
        <div></div><div class="ctrl" onmousedown="move('up')" onmouseup="stop()">↑</div><div></div>
        <div class="ctrl" onmousedown="move('left')" onmouseup="stop()">←</div>
        <div class="ctrl" onmousedown="move('down')" onmouseup="stop()">↓</div>
        <div class="ctrl" onmousedown="move('right')" onmouseup="stop()">→</div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const doorBtn = document.getElementById('door-btn');

canvas.width = 800;
canvas.height = 600;

// Oyun Durumu
let currentMap = 'outside'; // 'outside' veya 'inside'
let player = {
    x: 400, y: 500,
    speed: 4,
    width: 64, height: 64,
    direction: 'down',
    isMoving: false
};

// Görselleri Yükle
const images = {
    maps: {
        outside: 'https://i.ibb.co/9kYVv8HF/MG-20260513-WA0001.jpg',
        inside: 'https://i.ibb.co/jZLz5d4X/MG-20260513-WA0000.jpg'
    },
    sprites: {
        stand_back: 'https://i.ibb.co/YBmnvKR0/1778341855649-1.jpg',
        stand_front: 'https://i.ibb.co/HDfvc589/1778341855649-2.jpg',
        stand_right: 'https://i.ibb.co/bRFJ8XkZ/1778341855649-3.jpg',
        stand_left: 'https://i.ibb.co/NgVq4cQB/1778341855649-4.jpg',
        walk_back: 'https://i.ibb.co/pBV1FvL2/1778341855649-5.jpg',
        walk_front: 'https://i.ibb.co/ZRzhXFr8/1778341855649-6.jpg',
        walk_right: 'https://i.ibb.co/nq0LFGgd/1778341855649-7.jpg',
        walk_left: 'https://i.ibb.co/3ZwvfRY/1778341855649-8.jpg'
    }
};

const loadedImages = {};
function preload() {
    for (let key in images.maps) {
        let img = new Image(); img.src = images.maps[key]; loadedImages[key] = img;
    }
    for (let key in images.sprites) {
        let img = new Image(); img.src = images.sprites[key]; loadedImages[key] = img;
    }
}
preload();

// Hareket Fonksiyonları
function move(dir) { player.direction = dir; player.isMoving = true; }
function stop() { player.isMoving = false; }

function toggleMap() {
    if (currentMap === 'outside') {
        currentMap = 'inside';
        player.x = 400; player.y = 500; // İçeri girince başlama noktası
    } else {
        currentMap = 'outside';
        player.x = 320; player.y = 350; // Dışarı çıkınca kapı önü
    }
}

function update() {
    if (player.isMoving) {
        if (player.direction === 'up') player.y -= player.speed;
        if (player.direction === 'down') player.y += player.speed;
        if (player.direction === 'left') player.x -= player.speed;
        if (player.direction === 'right') player.x += player.speed;
    }

    // Kapı Kontrolü (Koordinatlar haritaya göre ayarlanmalı)
    let nearDoor = false;
    if (currentMap === 'outside' && player.x > 300 && player.x < 380 && player.y < 350) nearDoor = true;
    if (currentMap === 'inside' && player.y > 520) nearDoor = true;
    
    doorBtn.style.display = nearDoor ? 'flex' : 'none';
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Haritayı Çiz
    if (loadedImages[currentMap]) {
        ctx.drawImage(loadedImages[currentMap], 0, 0, canvas.width, canvas.height);
    }

    // Karakteri Çiz
    let spriteKey = (player.isMoving ? 'walk_' : 'stand_') + (player.direction === 'up' ? 'back' : player.direction === 'down' ? 'front' : player.direction);
    if (loadedImages[spriteKey]) {
        ctx.drawImage(loadedImages[spriteKey], player.x, player.y, player.width, player.height);
    }

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

// Klavye Desteği
window.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp' || e.key === 'w') move('up');
    if (e.key === 'ArrowDown' || e.key === 's') move('down');
    if (e.key === 'ArrowLeft' || e.key === 'a') move('left');
    if (e.key === 'ArrowRight' || e.key === 'd') move('right');
});
window.addEventListener('keyup', stop);

// Oyunu Başlat
window.onload = draw;
</script>

</body>
</html>
