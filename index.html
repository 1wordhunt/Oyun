<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER GLOW: EVOLUTION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #030308; font-family: 'Rajdhani', sans-serif; }
        
        #game-container {
            position: relative; width: 100%; height: 100%; max-width: 450px; margin: 0 auto;
            background: #000; overflow: hidden; box-shadow: 0 0 40px rgba(0, 242, 254, 0.15);
        }
        
        canvas { display: block; width: 100%; height: 100%; }
        
        /* Cyberpunk UI Overlay */
        .hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
            pointer-events: none; z-index: 10; display: flex; justify-content: space-between;
        }
        .stat-group { display: flex; flex-direction: column; }
        .label { font-size: 11px; color: #0ff; letter-spacing: 2px; font-family: 'Orbitron', sans-serif; text-shadow: 0 0 5px #0ff; }
        .val { font-size: 28px; font-family: 'Orbitron', sans-serif; color: #fff; font-weight: 900; }
        
        /* Glow Meter */
        .meter-box {
            position: absolute; bottom: 20px; left: 20px; right: 20px; pointer-events: none; z-index: 10;
        }
        .bar {
            width: 100%; height: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,242,254,0.3);
            border-radius: 5px; overflow: hidden; margin-top: 5px; box-shadow: 0 0 10px rgba(0,242,254,0.1);
        }
        .fill { height: 100%; width: 100%; background: linear-gradient(90deg, #00f2fe, #f0f); box-shadow: 0 0 15px #0ff; transition: width 0.2s; }

        /* Modern Glass Menus */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 3, 8, 0.9); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; padding: 30px; text-align: center; transition: opacity 0.4s ease;
        }
        .hidden { opacity: 0; pointer-events: none; display: none !important; }
        
        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 38px; font-weight: 900; letter-spacing: 2px;
            background: linear-gradient(45deg, #00f2fe, #f0f); -webkit-background-clip: text; color: transparent;
            margin-bottom: 10px; filter: drop-shadow(0 0 15px rgba(0,242,254,0.4));
        }
        p { color: #6c7280; font-size: 14px; margin-bottom: 30px; line-height: 1.6; max-width: 85%; }
        
        .btn {
            background: transparent; border: 2px solid #0ff; color: #0ff; padding: 14px 35px;
            font-size: 18px; font-family: 'Orbitron', sans-serif; font-weight: 700; text-transform: uppercase;
            border-radius: 4px; cursor: pointer; box-shadow: 0 0 15px rgba(0,242,254,0.2), inset 0 0 10px rgba(0,242,254,0.2);
            transition: all 0.2s; width: 80%; max-width: 260px; margin-bottom: 15px;
        }
        .btn:active { transform: scale(0.98); background: rgba(0,242,254,0.1); box-shadow: 0 0 25px #0ff, inset 0 0 15px #0ff; }
        .btn-ad { border-color: #f0f; color: #f0f; box-shadow: 0 0 15px rgba(240,0,255,0.2), inset 0 0 10px rgba(240,0,255,0.2); }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div class="stat-group">
            <span class="label">RÜTBE</span>
            <span class="val" id="rank-ui" style="font-size: 18px; color: #cd7f32;">ÇAYLAK BRONZ</span>
        </div>
        <div class="stat-group" style="text-align: right;">
            <span class="label">NET GELİR (XP)</span>
            <span class="val" id="score-ui">0</span>
        </div>
    </div>
    
    <div class="meter-box">
        <span class="label" style="font-size: 9px;">GLOW UP ENERJİSİ</span>
        <div class="bar"><div class="fill" id="energy-ui"></div></div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="start-screen" class="screen">
        <h1>CYBER GLOW</h1>
        <p>Developer Burak Engine v3.0.<br>Ekrana basılı tutarak yüksel, bırakarak alçal! Engelleri aş ve saf güce ulaş.</p>
        <button class="btn" onclick="bootSystem()">Sistemi Başlat</button>
    </div>

    <div id="gameover-screen" class="screen hidden">
        <h1 style="background: linear-gradient(45deg, #ff0055, #f0f); -webkit-background-clip: text;">ALGORİTMA ÇÖKTÜ</h1>
        <p>Gereksiz ödem ve eski toksik cache dosyaları motoru kilitledi!</p>
        <div style="margin-bottom: 25px;">
            <span class="label">TOPLAM KAZANÇ</span>
            <div class="val" id="final-score" style="color: #0ff; font-size: 36px;">0</div>
        </div>
        <button class="btn btn-ad" onclick="simulateAd()">🎬 REKLAM İZLE ($1.50 KAZAN)</button>
        <button class="btn" style="font-size: 14px; padding: 8px;" onclick="bootSystem()">Yeniden Başlat</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    const scoreUi = document.getElementById('score-ui');
    const rankUi = document.getElementById('rank-ui');
    const energyUi = document.getElementById('energy-ui');
    const startScreen = document.getElementById('start-screen');
    const gameoverScreen = document.getElementById('gameover-screen');
    const finalScore = document.getElementById('final-score');

    let w, h, loopId;
    let state = 'MENU';
    let frame = 0;
    
    // Game Config
    let score = 0;
    let energy = 100;
    let gravity = 0.4;
    let thrust = -7;
    let speed = 5;
    
    let player = { x: 60, y: 200, vy: 0, radius: 14, isThrusting: false };
    let obstacles = [];
    let particles = [];
    let items = [];

    function resize() {
        const box = document.getElementById('game-container');
        w = canvas.width = box.clientWidth;
        h = canvas.height = box.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Input Listiners
    const startThrust = () => { player.isThrusting = true; };
    const endThrust = () => { player.isThrusting = false; };
    
    window.addEventListener('mousedown', startThrust);
    window.addEventListener('mouseup', endThrust);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); startThrust(); }, {passive: false});
    window.addEventListener('touchend', endThrust);

    function checkRank() {
        let r = "Çaylak Bronz", c = "#cd7f32";
        if(score > 200) { r = "Demir Gri"; c = "#aaaaaa"; }
        if(score > 500) { r = "Altın Sarı"; c = "#ffd700"; }
        if(score > 1000) { r = "Elmas Mavi"; c = "#00f2fe"; }
        if(score > 2000) { r = "Elit Kırmızı"; c = "#ff0055"; }
        rankUi.innerText = r; rankUi.style.color = c;
    }

    function spawnParticle(x, y, color) {
        for(let i=0; i<8; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                alpha: 1, color: color
            });
        }
    }

    function bootSystem() {
        startScreen.classList.add('hidden');
        gameoverScreen.classList.add('hidden');
        score = 0; energy = 100; speed = 5;
        player.y = h / 2; player.vy = 0;
        obstacles = []; items = []; particles = [];
        state = 'PLAY';
    }

    function triggerDeath() {
        state = 'OVER';
        gameoverScreen.classList.remove('hidden');
        finalScore.innerText = score + " XP";
    }

    function simulateAd() {
        alert("💰 Global AdMob Geliri Aktif! ABD CPM Oranından hesabına +$1.50 eklendi. (Simülasyon)");
        gameoverScreen.classList.add('hidden');
        energy = 100; obstacles = []; items = [];
        state = 'PLAY';
    }

    // Engine Core Loops
    function update() {
        if (state !== 'PLAY') return;
        frame++;

        // Player physics
        if (player.isThrusting) {
            player.vy += thrust * 0.12;
            // Rocket particle tail
            particles.push({ x: player.x - 10, y: player.y, vx: -Math.random()*4 - 2, vy: (Math.random()-0.5)*2, alpha: 1, color: '#f0f' });
        }
        player.vy += gravity;
        player.y += player.vy;

        // Screen boundaries
        if (player.y - player.radius < 0) { player.y = player.radius; player.vy = 0; }
        if (player.y + player.radius > h) { triggerDeath(); }

        // Increase speed smoothly
        if (frame % 500 === 0) speed += 0.5;

        // Spawn obstacles and items
        if (frame % 90 === 0) {
            let wallY = Math.random() * (h - 150) + 50;
            obstacles.push({ x: w + 30, y: wallY, width: 30, height: 100 });
            
            // Spawn a clean food item next to obstacle
            items.push({ x: w + 90, y: Math.random() * (h - 60) + 30, collected: false });
        }

        // Move obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].x -= speed;
            
            // Collision with wall
            let o = obstacles[i];
            if (player.x + player.radius > o.x && player.x - player.radius < o.x + o.width &&
                player.y + player.radius > o.y && player.y - player.radius < o.y + o.height) {
                energy -= 35;
                spawnParticle(player.x, player.y, '#ff0055');
                obstacles.splice(i, 1);
                if (energy <= 0) triggerDeath();
                continue;
            }
            if (o.x < -40) obstacles.splice(i, 1);
        }

        // Move items (Köy yumurtası/özü temsilcisi neon küreler)
        for (let i = items.length - 1; i >= 0; i--) {
            items[i].x -= speed;
            let it = items[i];
            
            let d = Math.hypot(player.x - it.x, player.y - it.y);
            if (d < player.radius + 15) {
                score += 25;
                energy = Math.min(100, energy + 10);
                spawnParticle(it.x, it.y, '#0ff');
                items.splice(i, 1);
                scoreUi.innerText = score;
                checkRank();
                continue;
            }
            if (it.x < -40) items.splice(i, 1);
        }

        // Update particles
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].x += particles[i].vx;
            particles[i].y += particles[i].vy;
            particles[i].alpha -= 0.04;
            if (particles[i].alpha <= 0) particles.splice(i, 1);
        }

        energyUi.style.width = energy + '%';
    }

    function draw() {
        // Dark premium workspace background
        ctx.fillStyle = '#030308';
        ctx.fillRect(0, 0, w, h);

        // Tech Grid lines
        ctx.strokeStyle = 'rgba(0, 242, 254, 0.02)';
        ctx.lineWidth = 1;
        for(let i=0; i<w; i+=40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke(); }
        for(let i=0; i<h; i+=40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke(); }

        if (state !== 'PLAY' && state !== 'OVER') return;

        // Draw items (Neon Blue Orbs)
        items.forEach(it => {
            ctx.shadowBlur = 15; ctx.shadowColor = '#00f2fe';
            ctx.fillStyle = '#00f2fe';
            ctx.beginPath(); ctx.arc(it.x, it.y, 8, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        });

        // Draw obstacles (Neon Pink Warning Walls)
        obstacles.forEach(o => {
            ctx.shadowBlur = 10; ctx.shadowColor = '#ff0055';
            ctx.fillStyle = 'rgba(255, 0, 85, 0.2)';
            ctx.fillRect(o.x, o.y, o.width, o.height);
            ctx.strokeStyle = '#ff0055';
            ctx.lineWidth = 2;
            ctx.strokeRect(o.x, o.y, o.width, o.height);
            ctx.shadowBlur = 0;
        });

        // Draw particles
        particles.forEach(p => {
            ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill(); ctx.restore();
        });

        // Draw Player (The Cyber Core Alpha)
        ctx.shadowBlur = 20; ctx.shadowColor = '#00f2fe';
        let grad = ctx.createRadialGradient(player.x, player.y, 2, player.x, player.y, player.radius);
        grad.addColorStop(0, '#fff');
        grad.addColorStop(0.4, '#00f2fe');
        grad.addColorStop(1, '#f0f');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }

    function runEngine() {
        update();
        draw();
        requestAnimationFrame(runEngine);
    }
    requestAnimationFrame(runEngine);
</script>
</body>
</html>
