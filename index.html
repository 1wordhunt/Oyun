<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The House Escape - Joystick Pro</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        #game-container {
            width: 100vw; 
            height: 100vh;
            background-image: url('https://i.ibb.co/G4NJVSWg/file-00000000d3cc7246a95df5976c8174ad.png'); 
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            background-position: center;
            position: relative;
            image-rendering: pixelated;
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

        #developer-tag {
            position: absolute; top: 15px; right: 20px;
            color: rgba(0, 255, 255, 0.8); font-size: 14px; font-weight: bold;
            text-shadow: 2px 2px 0px #000; z-index: 20;
        }

        /* --- JOYSTICK TASARIMI --- */
        #joystick-wrapper {
            position: absolute; bottom: 50px; left: 50px;
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 50%; z-index: 30; touch-action: none;
        }

        #joystick-stick {
            position: absolute; top: 50%; left: 50%;
            width: 50px; height: 50px;
            background: radial-gradient(circle, #00ffff, #008888);
            border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        /* --- RUN BUTONU --- */
        #btnRun {
            position: absolute; bottom: 60px; right: 60px;
            width: 70px; height: 70px; border-radius: 50%;
            background: radial-gradient(circle, #ff4b4b, #aa0000);
            border: 2px solid #550000; color: white;
            font-size: 16px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            z-index: 30; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            touch-action: manipulation;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="developer-tag">Developer: Harun Sürücü</div>
    
    <div id="joystick-wrapper">
        <div id="joystick-stick"></div>
    </div>
    <div id="btnRun">RUN</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Resimleri Yükle
    const imgs = {
        idleUp: new Image(), walkUp: new Image(),
        idleDown: new Image(), walkDown: new Image(),
        idleLeft: new Image(), walkLeft: new Image(),
        idleRight: new Image(), walkRight: new Image()
    };

    imgs.idleUp.src = "https://i.ibb.co/YBmnvKR0/1778341855649-1.jpg";
    imgs.idleDown.src = "https://i.ibb.co/HDfvc589/1778341855649-2.jpg";
    imgs.idleRight.src = "https://i.ibb.co/bRFJ8XkZ/1778341855649-3.jpg";
    imgs.idleLeft.src = "https://i.ibb.co/NgVq4cQB/1778341855649-4.jpg";
    imgs.walkUp.src = "https://i.ibb.co/pBV1FvL2/1778341855649-5.jpg";
    imgs.walkDown.src = "https://i.ibb.co/ZRzhXFr8/1778341855649-6.jpg";
    imgs.walkRight.src = "https://i.ibb.co/nq0LFGgd/1778341855649-7.jpg";
    imgs.walkLeft.src = "https://i.ibb.co/3ZwvfRY/1778341855649-8.jpg";

    let burak = {
        x: 0, y: 0, w: 50, h: 90,
        baseSpeed: 3, speed: 3,
        direction: 'down', moving: false
    };

    function resizeCanvas() {
        // Karakterin ekran oranını koru (disappearing fix)
        let relX = burak.x / canvas.width || 0.5;
        let relY = burak.y / canvas.height || 0.7;
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        burak.x = relX * canvas.width;
        burak.y = relY * canvas.height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // --- JOYSTICK MANTIĞI ---
    const jWrapper = document.getElementById('joystick-wrapper');
    const jStick = document.getElementById('joystick-stick');
    let jInput = { x: 0, y: 0, active: false };

    jWrapper.addEventListener('touchstart', e => { jInput.active = true; handleJoystick(e); });
    window.addEventListener('touchmove', e => { if(jInput.active) handleJoystick(e); });
    window.addEventListener('touchend', () => { 
        jInput.active = false; 
        jInput.x = 0; jInput.y = 0;
        jStick.style.left = '50%'; jStick.style.top = '50%';
    });

    function handleJoystick(e) {
        const touch = e.touches[0];
        const rect = jWrapper.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        const distance = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
        const angle = Math.atan2(dy, dx);

        jInput.x = Math.cos(angle) * (distance / 50);
        jInput.y = Math.sin(angle) * (distance / 50);

        jStick.style.left = (50 + jInput.x * 40) + '%';
        jStick.style.top = (50 + jInput.y * 40) + '%';
    }

    // RUN Butonu
    let isRunning = false;
    const btnRun = document.getElementById('btnRun');
    btnRun.addEventListener('touchstart', () => isRunning = true);
    btnRun.addEventListener('touchend', () => isRunning = false);

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        burak.speed = isRunning ? burak.baseSpeed * 2.5 : burak.baseSpeed;
        burak.moving = false;

        if (jInput.active && Math.abs(jInput.x) + Math.abs(jInput.y) > 0.1) {
            burak.moving = true;
            burak.x += jInput.x * burak.speed;
            burak.y += jInput.y * burak.speed;

            // Yön Belirleme
            if (Math.abs(jInput.x) > Math.abs(jInput.y)) {
                burak.direction = jInput.x > 0 ? 'right' : 'left';
            } else {
                burak.direction = jInput.y > 0 ? 'down' : 'up';
            }
        }

        // Sınırlar
        burak.x = Math.max(0, Math.min(canvas.width - burak.w, burak.x));
        burak.y = Math.max(canvas.height * 0.3, Math.min(canvas.height - burak.h, burak.y));

        // Karakter Çizimi
        let currentImg;
        if (!burak.moving) {
            currentImg = imgs['idle' + burak.direction.charAt(0).toUpperCase() + burak.direction.slice(1)];
        } else {
            let step = Math.floor(Date.now() / 150) % 2 === 0;
            currentImg = step ? imgs['walk' + burak.direction.charAt(0).toUpperCase() + burak.direction.slice(1)] : imgs['idle' + burak.direction.charAt(0).toUpperCase() + burak.direction.slice(1)];
        }

        if (currentImg && currentImg.complete) {
            // Şeffaflık Hilesi: Beyaz alanları temizle (DİKKAT: PNG kullanman daha iyi olur)
            ctx.drawImage(currentImg, burak.x, burak.y, burak.w, burak.h);
        }

        // İsim Etiketi
        ctx.fillStyle = "#00ffff";
        ctx.font = "bold 16px Courier New";
        ctx.textAlign = "center";
        ctx.fillText("Burak", burak.x + burak.w/2, burak.y - 10);

        requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
