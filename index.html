<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON SWITCH: MERGE PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #020205; font-family: 'Rajdhani', sans-serif; }
        
        #game-wrapper {
            position: relative; width: 100%; height: 100%; max-width: 450px; margin: 0 auto;
            background: #000; overflow: hidden; border: 2px solid rgba(0, 242, 254, 0.1);
        }
        
        canvas { display: block; width: 100%; height: 100%; }
        
        /* Play Store Style Premium HUD */
        .hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
            pointer-events: none; z-index: 10; display: flex; justify-content: space-between;
        }
        .hud-item { display: flex; flex-direction: column; }
        .hud-label { font-size: 10px; color: #0ff; letter-spacing: 2px; font-family: 'Orbitron', sans-serif; text-shadow: 0 0 8px #0ff; }
        .hud-val { font-size: 28px; font-family: 'Orbitron', sans-serif; color: #fff; font-weight: 900; }
        
        /* Mobile Smooth Glass Menus */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 4, 12, 0.96); backdrop-filter: blur(12px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; padding: 30px; text-align: center; transition: opacity 0.3s ease;
        }
        .hidden { display: none !important; }
        
        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 38px; font-weight: 900; letter-spacing: 2px;
            background: linear-gradient(45deg, #00f2fe, #f0f, #ff0055); -webkit-background-clip: text; color: transparent;
            margin-bottom: 10px; filter: drop-shadow(0 0 15px rgba(0,242,254,0.5));
        }
        p { color: #6c7280; font-size: 14px; margin-bottom: 30px; line-height: 1.6; max-width: 85%; }
        
        .btn {
            background: linear-gradient(135deg, rgba(0,242,254,0.1), rgba(255,0,85,0.1));
            border: 2px solid #0ff; color: #0ff; padding: 15px 30px;
            font-size: 16px; font-family: 'Orbitron', sans-serif; font-weight: 900; text-transform: uppercase;
            border-radius: 6px; cursor: pointer; box-shadow: 0 0 15px rgba(0,242,254,0.2);
            width: 85%; max-width: 260px; margin-bottom: 12px; letter-spacing: 1px;
        }
        .btn:active { transform: scale(0.96); background: rgba(0,242,254,0.2); box-shadow: 0 0 25px #0ff; }
        .btn-ad { border-color: #ff0055; color: #ff0055; box-shadow: 0 0 15px rgba(255,0,85,0.2); }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="hud">
        <div class="hud-item">
            <span class="hud-label">RÜTBE</span>
            <span class="hud-val" id="rank-text" style="font-size: 14px; color: #cd7f32;">ÇAYLAK BRONZ</span>
        </div>
        <div class="hud-item" style="text-align: right;">
            <span class="hud-label">NET KAZANÇ</span>
            <span class="hud-val" id="score-text">0 XP</span>
        </div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <div id="menu-screen" class="screen">
        <h1>NEON SWITCH</h1>
        <p>Developer Burak Studio & Play Store Core Config.<br>Ekrana dokunarak merkezdeki neon üçgeni döndür. Yukarıdan düşen renkli küreleri kendi rengiyle eşleştir!</p>
        <button class="btn" onclick="startPlayStoreEngine()">Sistemi Başlat</button>
    </div>

    <div id="gameover-screen" class="screen hidden">
        <h1 style="background: linear-gradient(45deg, #ff0055, #f0f); -webkit-background-clip: text; font-size: 32px;">BAĞLANTI KESİLDİ</h1>
        <p>Hatalı veri eşleşmesi. Algoritma durduruldu.</p>
        <div style="margin-bottom: 25px;">
            <span class="hud-label">TOPLANAN TOTAL PUAN</span>
            <div class="hud-val" id="final-payout" style="color: #0ff; font-size: 36px;">0 XP</div>
        </div>
        <button class="btn btn-ad" onclick="triggerAdSimulation()">🎬 REKLAM İZLE VE DEVAM ET</button>
        <button class="btn" style="font-size: 13px; padding: 10px;" onclick="startPlayStoreEngine()">Yeniden Dene</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const scoreText = document.getElementById('score-text');
    const rankText = document.getElementById('rank-text');
    const menuScreen = document.getElementById('menu-screen');
    const gameoverScreen = document.getElementById('gameover-screen');
    const finalPayout = document.getElementById('final-payout');

    let w, h, state = 'MENU', frame = 0;
    let score = 0, targetRotation = 0, currentRotation = 0;
    
    // Play Store Uyumlu 3'lü Neon Paleti
    const colors = ['#00f2fe', '#f0f', '#00ff66'];
    let currentSides = [0, 1, 2]; // Triangle layout profiles
    
    let obstacles = [];
    let particles = [];
    let audioCtx = null;

    function resize() {
        const wrapper = document.getElementById('game-wrapper');
        w = canvas.width = wrapper.clientWidth;
        h = canvas.height = wrapper.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Web Audio API Synth (Sıfır harici dosya, kusursuz ses efekti!)
    function playBeep(freq, type, duration) {
        try {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }

    // Mobil Dokunmatik Kontrol (Üçgeni 120 derece döndürür)
    const handleInput = (e) => {
        if (state !== 'PLAY') return;
        e.preventDefault();
        targetRotation += (Math.PI * 2) / 3; // 120 Degrees jump
        playBeep(440, 'triangle', 0.1);
    };
    window.addEventListener('mousedown', handleInput);
    window.addEventListener('touchstart', handleInput, {passive: false});

    function createExplosion(x, y, color) {
        for(let i=0; i<12; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                alpha: 1, color: color
            });
        }
    }

    function updateRankSystem() {
        let r = "Çaylak Bronz", c = "#cd7f32";
        if(score > 200) { r = "Demir Gri"; c = "#aaaaaa"; }
        if(score > 500) { r = "Altın Sarı"; c = "#ffd700"; }
        if(score > 1000) { r = "Elmas Mavi"; c = "#00f2fe"; }
        if(score > 2000) { r = "Elit Kırmızı"; c = "#ff0055"; }
        rankText.innerText = r; rankText.style.color = c;
    }

    function startPlayStoreEngine() {
        menuScreen.classList.add('hidden');
        gameoverScreen.classList.add('hidden');
        score = 0; targetRotation = 0; currentRotation = 0;
        obstacles = []; particles = [];
        state = 'PLAY';
        scoreText.innerText = "0 XP";
        updateRankSystem();
    }

    function triggerGameOver() {
        playBeep(150, 'sawtooth', 0.4);
        state = 'OVER';
        gameoverScreen.classList.remove('hidden');
        finalPayout.innerText = score + " XP";
    }

    function triggerAdSimulation() {
        alert("💰 Google AdMob SDK Dağıtımı: Reklam videosu başarıyla yüklendi. Play Store geliri optimize edildi! (Simülasyon)");
        gameoverScreen.classList.add('hidden');
        obstacles = []; state = 'PLAY';
    }

    // Render & Calculation Pipeline
    function run() {
        requestAnimationFrame(run);
        
        ctx.fillStyle = '#030308';
        ctx.fillRect(0, 0, w, h);

        // Cyber Grid Lines
        ctx.strokeStyle = 'rgba(0, 242, 254, 0.015)';
        ctx.lineWidth = 1;
        for(let i=0; i<w; i+=40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke(); }

        if (state !== 'PLAY' && state !== 'OVER') return;
        frame++;

        let cx = w / 2, cy = h / 2;

        // Interpolate triangle rotation smoothly
        currentRotation += (targetRotation - currentRotation) * 0.25;

        // 1. UPDATE AND SPAWN OBSTACLES
        if (state === 'PLAY') {
            let spawnRate = Math.max(30, 70 - Math.floor(score / 50));
            if (frame % spawnRate === 0) {
                obstacles.push({
                    x: cx, y: -20,
                    vy: 3 + Math.min(4, score / 300),
                    colorIndex: Math.floor(Math.random() * 3),
                    radius: 10
                });
            }
        }

        // Process falling spheres
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            if (state === 'PLAY') o.y += o.vy;

            // Render Sphere
            ctx.shadowBlur = 15; ctx.shadowColor = colors[o.colorIndex];
            ctx.fillStyle = colors[o.colorIndex];
            ctx.beginPath(); ctx.arc(o.x, o.y, o.radius, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;

            // Collision check with central triangle shield
            let dist = cy - 40 - o.y;
            if (dist <= 0 && dist > -15) {
                // Calculate which side of the triangle is facing UP
                let normRot = ((currentRotation % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                let sector = Math.floor(((normRot + Math.PI/6) % (Math.PI * 2)) / ((Math.PI * 2) / 3));
                let facingColorIndex = (3 - sector) % 3;

                if (facingColorIndex === o.colorIndex) {
                    score += 25;
                    scoreText.innerText = score + " XP";
                    updateRankSystem();
                    playBeep(600, 'sine', 0.08);
                    createExplosion(o.x, o.y, colors[o.colorIndex]);
                    obstacles.splice(i, 1);
                } else {
                    triggerGameOver();
                }
            } else if (o.y > h + 20) {
                obstacles.splice(i, 1);
            }
        }

        // Process explosion particles
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 0.04;
            if (p.alpha <= 0) { particles.splice(i, 1); continue; }
            ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill(); ctx.restore();
        }

        // 2. DRAW CENTRAL LOGIC TRIANGLE SHIELD
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(currentRotation);
        
        let triRadius = 45;
        ctx.lineWidth = 8;
        ctx.lineJoin = 'round';
        
        for (let i = 0; i < 3; i++) {
            let angle1 = (i * Math.PI * 2) / 3 - Math.PI / 2;
            let angle2 = ((i + 1) * Math.PI * 2) / 3 - Math.PI / 2;
            
            ctx.beginPath();
            ctx.moveTo(Math.sin(angle1) * triRadius, Math.cos(angle1) * triRadius);
            ctx.lineTo(Math.sin(angle2) * triRadius, Math.cos(angle2) * triRadius);
            
            ctx.strokeStyle = colors[i];
            ctx.shadowBlur = 20; ctx.shadowColor = colors[i];
            ctx.stroke();
        }
        ctx.restore();
        ctx.shadowBlur = 0;
    }

    run();
</script>
</body>
</html>
