<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Link Tree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Verdiğin yeni arka plan resmi */
            background: url('https://i.ibb.co/84LyD71M/46fe29e1c6c79fa24dd869901611441e.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: white;
        }

        .header-area {
            text-align: center;
            margin-bottom: 40px;
            z-index: 2;
        }

        .header-title {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .links-container {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 24px; /* Yuvarlak efektlerin rahat görünmesi için araları biraz açtım */
        }

        /* Efekt için kutuyu saran dış kapsayıcı */
        .card-wrapper {
            position: relative;
            width: 100%;
        }

        /* Kutunun arkasından çıkan BEYAZ YUVARLAK (Işıltı) Efektleri */
        .card-wrapper::before, .card-wrapper::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            filter: blur(25px); /* Yumuşak yuvarlak ışık hissi verir */
            z-index: 1;
            transition: all 0.4s ease;
            pointer-events: none;
        }
        /* Sol arkadaki yuvarlak */
        .card-wrapper::before {
            left: -10px;
            top: -10px;
        }
        /* Sağ arkadaki yuvarlak */
        .card-wrapper::after {
            right: -10px;
            bottom: -10px;
        }

        /* Hover durumunda yuvarlakların parlamasını artırır */
        .card-wrapper:hover::before, .card-wrapper:hover::after {
            background: rgba(255, 255, 255, 0.45);
            width: 100px;
            height: 100px;
        }

        /* Ana Kutu Tasarımı (Resim Komple Arka Plan Olacak) */
        .link-card {
            position: relative;
            width: 100%;
            height: 80px; /* Kutunun yüksekliği */
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            overflow: hidden;
            z-index: 2;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            
            /* Resim yüklenene kadar duracak şeffaf koyu renk */
            background-color: rgba(0, 0, 0, 0.4); 
            background-size: cover;
            background-position: center;
        }

        /* Kutuya dokununca veya üzerine gelince hafif büyüme efekti */
        .link-card:hover {
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 6px 20px rgba(255,255,255,0.15);
        }

        /* Resmin üzerine gelen koyu katman (Yazıların net okunması için) */
        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }

        /* Kutunun İçindeki Yazı Alanı */
        .card-text {
            position: relative;
            z-index: 2;
            flex-grow: 1;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
            padding: 0 20px;
        }

        /* Sağ taraftaki Üç Nokta Seçenek Simgesi */
        .card-options {
            position: relative;
            z-index: 2;
            font-size: 1.4rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
            padding-right: 20px;
            opacity: 0.8;
        }
    </style>
</head>
