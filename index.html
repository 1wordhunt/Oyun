<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The House Escape</title>
    <style>
        /* Ekran Ayarları */
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        #game-container {
            width: 100vw; 
            height: 100vh;
            background-image: url('https://i.ibb.co/G4NJVSWg/file-00000000d3cc7246a95df5976c8174ad.png'); 
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            background-position: center;
            position: relative;
            image-rendering: pixelated;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* Geliştirici İmzası */
        #developer-tag {
            position: absolute;
            top: 15px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: bold;
            text-shadow: 2px 2px 0px #000;
            z-index: 20;
            pointer-events: none;
        }

        /* --- PROFESYONEL OYUN KONSOLU ARAYÜZÜ --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
            pointer-events: none; 
        }

        /* D-Pad (Yön Tuşları) */
        .d-pad {
            position: absolute;
            bottom: 40px;
            left: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
        }

        .d-pad-row { display: flex; }

        .btn-dir {
            width: 55px;
            height: 55px;
            margin: 2px;
            background: linear-gradient(to bottom, #444, #222);
            border: 2px solid #111;
            color: rgba(255, 255, 255, 0.5);
            font-size: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.1), 0 5px 0 #111, 0 8px 10px rgba(0,0,0,0.5);
            border-radius: 8px;
            touch-action: manipulation;
            transition: all 0.05s ease;
        }
        
        .btn-dir:active { 
            transform: translateY(5px);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 0px 0 #111, 0 2px 5px rgba(0,0,0,0.5);
            background: linear-gradient(to bottom, #333, #111);
            color: rgba(255, 255, 255, 0.9);
        }

        /* D-Pad Özel Şekillendirme */
        #btnUp { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
        #btnDown { border-top-left-radius: 0; border-top-right-radius: 0; }
        #btnLeft { border-top-right-radius: 0; border-bottom-right-radius: 0; }
        #btnRight { border-top-left-radius: 0; border-bottom-left-radius: 0; }

        /* RUN (Koşma) Butonu - Arcade Style */
        #btnRun {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(to bottom, #ff4b4b, #aa0000);
            border: 2px solid #4a0000;
            color: white;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 5px 10px rgba(255,255,255,0.3), 0 8px 0 #550000, 0 12px 15px rgba(0,0,0,0.6);
            pointer-events: auto;
            touch-action: manipulation;
            text-shadow: 1px 1px 2px #000;
            transition: all 0.05s ease;
        }
        #btnRun:active { 
            transform: translateY(8px);
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.4), 0 0px 0 #550000, 0 4px 10px rgba(0,0,0,0.6);
            background: linear-gradient(to bottom, #dd0000, #880000);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="developer-tag">Developer: Harun Sürücü</div>
        
        <div class="d-pad">
            <div class="btn-dir" id="btnUp">▲</div>
            <div class="d-pad-row">
                <div class="btn-dir" id="btnLeft">◄</div>
                <div class="btn-dir" id="btnDown">▼</div>
                <div class="btn-dir" id="btnRight">►</div>
            </div>
        </div>
        <div id="btnRun">RUN</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const imgs = {
        idleUp: new Image(), walkUp: new Image(),
        idleDown: new Image(), walkDown: new Image(),
        idleLeft: new Image(), walkLeft: new Image(),
        idleRight: new Image(), walkRight: new Image()
    };

    imgs.idleUp.src = "https://i.ibb.co/YBmnvKR0/1778341855649-1.jpg";
    imgs.idleDown.src = "https://i.ibb.co/HDfvc589/1778341855649-2.jpg";
    imgs.idleRight.src = "https://i.ibb.co/bRFJ8XkZ/1778341855649-3.jpg";
    imgs.idleLeft.src = "https://i.ibb.co/NgVq4cQB/1778341855649-4.jpg";
    
    imgs.walkUp.src = "https://i.ibb.co/pBV1FvL2/1778341855649-5.jpg";
    imgs.walkDown.src = "https://i.ibb.co/ZRzhXFr8/1778341855649-6.jpg";
    imgs.walkRight.src = "https://i.ibb.co/nq0LFGgd/1778341855649-7.jpg";
    imgs.walkLeft.src = "https://i.ibb.co/3ZwvfRY/1778341855649-8.jpg";

    let burak = {
        x: canvas.width / 2,
        y: canvas.height * 0.6,
        w: 45,  
        h: 85,  
        baseSpeed: 3,
        speed: 3,
        direction: 'down',
        moving: false
    };

    let keys = { up: false, down: false, left: false, right: false, run: false };

    window.addEventListener("keydown", e => {
        if(e.code === "ArrowUp" || e.code === "KeyW") keys.up = true;
        if(e.code === "ArrowDown" || e.code === "KeyS") keys.down = true;
        if(e.code === "ArrowLeft" || e.code === "KeyA") keys.left = true;
        if(e.code === "ArrowRight" || e.code === "KeyD") keys.right = true;
        if(e.code === "ShiftLeft") keys.run = true;
    });
    window.addEventListener("keyup", e => {
        if(e.code === "ArrowUp" || e.code === "KeyW") keys.up = false;
        if(e.code === "ArrowDown" || e.code === "KeyS") keys.down = false;
        if(e.code === "ArrowLeft" || e.code === "KeyA") keys.left = false;
        if(e.code === "ArrowRight" || e.code === "KeyD") keys.right = false;
        if(e.code === "ShiftLeft") keys.run = false;
    });

    function setupButton(id, keyName) {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyName] = true; });
        btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyName] = false; });
        btn.addEventListener('mousedown', (e) => { e.preventDefault(); keys[keyName] = true; });
        btn.addEventListener('mouseup', (e) => { e.preventDefault(); keys[keyName] = false; });
        btn.addEventListener('mouseleave', (e) => { e.preventDefault(); keys[keyName] = false; });
    }

    setupButton('btnUp', 'up');
    setupButton('btnDown', 'down');
    setupButton('btnLeft', 'left');
    setupButton('btnRight', 'right');
    setupButton('btnRun', 'run');

    // --- YENİ KAYGAN ÇARPIŞMA SİSTEMİ (Duvarlara Takılmadan Kayma) ---
    function canMove(newX, newY) {
        // Üst sınırı 0.25'e çektim (Eski 0.4'tü), artık odanın arka köşelerine girebilirsin!
        if (newX < 0 || newX > canvas.width - burak.w) return false;
        if (newY < canvas.height * 0.25 || newY > canvas.height - burak.h) return false;
        
        // EĞER İLERİDE MASANIN/KOLTUĞUN İÇİNDEN GEÇMESİN İSTERSEN BURAYA KUTU(HITBOX) EKLERİZ
        return true; 
    }

    let frameCount = 0;

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        burak.speed = keys.run ? burak.baseSpeed * 2.5 : burak.baseSpeed;
        burak.moving = false;

        // X ve Y eksenlerini ayırdık, böylece çapraz giderken duvara çarparsan takılmaz, kenardan kayar.
        let nextX = burak.x;
        let nextY = burak.y;

        if (keys.up) { nextY -= burak.speed; burak.direction = 'up'; burak.moving = true; }
        else if (keys.down) { nextY += burak.speed; burak.direction = 'down'; burak.moving = true; }
        
        if (keys.left) { nextX -= burak.speed; burak.direction = 'left'; burak.moving = true; }
        else if (keys.right) { nextX += burak.speed; burak.direction = 'right'; burak.moving = true; }

        // Duvara çarpıyorsa dur, çarpmıyorsa ilerle
        if (canMove(nextX, burak.y)) burak.x = nextX;
        if (canMove(burak.x, nextY)) burak.y = nextY;

        let currentImage;
        frameCount++;

        if (!burak.moving) {
            if (burak.direction === 'up') currentImage = imgs.idleUp;
            else if (burak.direction === 'down') currentImage = imgs.idleDown;
            else if (burak.direction === 'left') currentImage = imgs.idleLeft;
            else if (burak.direction === 'right') currentImage = imgs.idleRight;
        } else {
            let toggleWalk = (Math.floor(frameCount / 10) % 2 === 0);
            if (burak.direction === 'up') currentImage = toggleWalk ? imgs.walkUp : imgs.idleUp;
            else if (burak.direction === 'down') currentImage = toggleWalk ? imgs.walkDown : imgs.idleDown;
            else if (burak.direction === 'left') currentImage = toggleWalk ? imgs.walkLeft : imgs.idleLeft;
            else if (burak.direction === 'right') currentImage = toggleWalk ? imgs.walkRight : imgs.idleRight;
        }

        if (currentImage.complete) { 
            ctx.drawImage(currentImage, burak.x, burak.y, burak.w, burak.h);
        }

        ctx.fillStyle = "#fff";
        ctx.font = "bold 16px Courier New";
        ctx.shadowBlur = 4;
        ctx.shadowColor = "#000";
        ctx.fillText("Burak", burak.x + 2, burak.y - 10);
        ctx.shadowBlur = 0; // Diğer çizimleri bozmaması için sıfırla

        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
