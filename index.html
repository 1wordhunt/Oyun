<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The House Escape: Shock - Harita Güncelleme</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; width: 1000px; height: 500px; border: 5px solid #1a1a1a; background: #111; }
        canvas { display: block; image-rendering: pixelated; }
        #header { position: absolute; top: 10px; width: 100%; text-align: center; color: #00ffff; font-family: 'Courier New', monospace; pointer-events: none; }
        .title { font-size: 24px; font-weight: bold; text-shadow: 0 0 15px #00ffff; }
        .timer { font-size: 18px; margin-top: 5px; opacity: 0.8; }
        .controls { position: absolute; bottom: 30px; right: 30px; display: flex; gap: 20px; }
        .btn { width: 85px; height: 85px; border: 3px solid #00ffff; background: rgba(0, 255, 255, 0.05); color: #00ffff; display: flex; justify-content: center; align-items: center; font-family: sans-serif; font-weight: bold; cursor: pointer; user-select: none; border-radius: 15px; }
        .btn:active { background: rgba(0, 255, 255, 0.3); transform: scale(0.9); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <div class="title">ŞOK EVDEN KAÇIŞ</div>
        <div id="gameTimer" class="timer">00:00:00</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div class="controls">
        <div class="btn" id="actionBtn" style="font-size: 30px;">👊</div>
        <div class="btn" id="runBtn">RUN</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1000; canvas.height = 500;

    let burak = { x: 450, y: 320, w: 38, h: 75, speed: 3.5, normalSpeed: 3.5, runSpeed: 7.5, isRunning: false };

    // Zamanlayıcı
    let startTime = Date.now();
    setInterval(() => {
        let diff = Date.now() - startTime;
        let h = Math.floor(diff / 3600000).toString().padStart(2, '0');
        let m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
        let s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        document.getElementById('gameTimer').innerText = `${h}:${m}:${s}`;
    }, 1000);

    // Kontroller
    let keys = {};
    window.addEventListener("keydown", e => keys[e.code] = true);
    window.addEventListener("keyup", e => keys[e.code] = false);

    const runBtn = document.getElementById('runBtn');
    runBtn.onmousedown = runBtn.ontouchstart = (e) => { e.preventDefault(); burak.speed = burak.runSpeed; burak.isRunning = true; };
    runBtn.onmouseup = runBtn.ontouchend = () => { burak.speed = burak.normalSpeed; burak.isRunning = false; };

    function drawMap() {
        // Arka Duvar ve Zemin
        ctx.fillStyle = "#1e1a16"; ctx.fillRect(0, 0, 1000, 500);
        ctx.fillStyle = "#120e0a"; ctx.fillRect(0, 400, 1000, 100);

        // Portreler (Sol Üst)
        for(let i=0; i<3; i++) {
            ctx.fillStyle = "#0a0a0a"; ctx.fillRect(30 + (i*65), 40, 50, 65);
            ctx.strokeStyle = "#2a2a2a"; ctx.lineWidth = 3; ctx.strokeRect(30 + (i*65), 40, 50, 65);
        }

        // Sarkaçlı Saat (Resimdeki konumda)
        ctx.fillStyle = "#3b2619"; ctx.fillRect(210, 80, 75, 320);
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(247, 125, 22, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#000"; ctx.fillRect(245, 125, 2, 15); // Akrep

        // Kitaplık
        ctx.fillStyle = "#2b1c12"; ctx.fillRect(380, 140, 110, 260);
        ctx.fillStyle = "#160d07";
        for(let i=0; i<4; i++) ctx.fillRect(385, 165 + (i*60), 100, 10);

        // Kırık Ayna (Resimdeki çatlak efektli)
        ctx.fillStyle = "#333"; ctx.fillRect(520, 160, 75, 130);
        ctx.strokeStyle = "#555"; ctx.strokeRect(520, 160, 75, 130);
        ctx.beginPath(); ctx.strokeStyle = "#666"; ctx.moveTo(520,160); ctx.lineTo(595,290); ctx.stroke();

        // Duvardaki Harita (Sağ Üst)
        ctx.fillStyle = "#bfa38a"; ctx.fillRect(810, 50, 160, 110);
        ctx.strokeStyle = "#4b3221"; ctx.strokeRect(810, 50, 160, 110);
        ctx.fillStyle = "#4b3221"; ctx.font = "10px sans-serif"; ctx.fillText("MAP", 880, 110);

        // Neon Borular (Resimdeki kıvrımlı yapı)
        ctx.lineWidth = 14; ctx.lineCap = "round"; ctx.lineJoin = "round";

        // Yeşil Boru (Sol - Neon)
        ctx.shadowBlur = 25; ctx.shadowColor = "#00ff44"; ctx.strokeStyle = "#00ff44";
        ctx.beginPath(); ctx.moveTo(0, 140); ctx.lineTo(195, 140); ctx.lineTo(195, 410); ctx.stroke();

        // Pembe Boru (Sağ - Neon)
        ctx.shadowBlur = 25; ctx.shadowColor = "#ff00ff"; ctx.strokeStyle = "#ff00ff";
        ctx.beginPath(); ctx.moveTo(760, 230); ctx.lineTo(965, 230); ctx.lineTo(965, 485); ctx.stroke();

        ctx.shadowBlur = 0; // Işık etkisini karakter için kapat
    }

    function update() {
        if (keys["ArrowLeft"] || keys["KeyA"]) burak.x -= burak.speed;
        if (keys["ArrowRight"] || keys["KeyD"]) burak.x += burak.speed;
        if (keys["ArrowUp"] || keys["KeyW"]) burak.y -= burak.speed;
        if (keys["ArrowDown"] || keys["KeyS"]) burak.y += burak.speed;

        // Ekran ve Alt Zemin Sınırları
        burak.x = Math.max(0, Math.min(1000 - burak.w, burak.x));
        burak.y = Math.max(120, Math.min(410, burak.y));

        drawMap();

        // Burak Karakteri (Gölge ve Işık Efektiyle)
        ctx.shadowBlur = 15; ctx.shadowColor = "#00ffff";
        ctx.fillStyle = burak.isRunning ? "#ff3300" : "#00ffff";
        ctx.fillRect(burak.x, burak.y, burak.w, burak.h);
        ctx.shadowBlur = 0;

        // İsim Etiketi
        ctx.fillStyle = "#fff"; ctx.font = "16px 'Courier New'";
        ctx.fillText("Burak", burak.x - 5, burak.y - 10);

        requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
