<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <title>God Level | Lucifer Michaelson</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Koyu Gece Arka Planı */
            background: url('https://i.ibb.co/84LyD71M/46fe29e1c6c79fa24dd869901611441e.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: white;
            overflow-x: hidden;
        }

        .header-area {
            text-align: center;
            margin-bottom: 40px;
            z-index: 2;
        }

        .header-title {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .links-container {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Beyaz Yuvarlak Işıltı Efektleri */
        .card-wrapper {
            position: relative;
            width: 100%;
        }

        .card-wrapper::before, .card-wrapper::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            filter: blur(25px);
            z-index: 1;
            transition: all 0.4s ease;
            pointer-events: none;
        }
        .card-wrapper::before { left: -10px; top: -10px; }
        .card-wrapper::after { right: -10px; bottom: -10px; }

        .card-wrapper:hover::before, .card-wrapper:hover::after {
            background: rgba(255, 255, 255, 0.4);
            width: 100px;
            height: 100px;
        }

        /* Ana Kutu Tasarımı */
        .link-card {
            position: relative;
            width: 100%;
            height: 80px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            overflow: hidden;
            z-index: 2;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            background-color: rgba(0, 0, 0, 0.4); 
            background-size: cover;
            background-position: center;
            cursor: pointer;
        }

        .link-card:hover {
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 6px 20px rgba(255,255,255,0.15);
        }

        .card-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }

        .card-text {
            position: relative;
            z-index: 2;
            flex-grow: 1;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
            padding: 0 20px;
        }

        .card-options {
            position: relative;
            z-index: 2;
            font-size: 1.4rem;
            padding-right: 20px;
            opacity: 0.8;
        }

        /* Alt Sosyal Medya Alanı */
        .social-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 22px;
            margin-top: 50px;
            margin-bottom: 20px;
            z-index: 2;
            flex-wrap: wrap;
            max-width: 520px;
            width: 100%;
        }

        .social-icon {
            color: rgba(255, 255, 255, 0.65);
            font-size: 1.7rem;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .social-icon:hover {
            color: #ffffff;
            transform: translateY(-4px);
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.7));
        }

        /* Popup Pencere Yapısı */
        .detail-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s ease;
            padding: 20px;
        }

        .detail-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .detail-content {
            position: relative;
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .detail-overlay.active .detail-content {
            transform: scale(1);
        }

        .back-btn {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 12px rgba(255,255,255,0.6);
        }

        .detail-img {
            width: 100%;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>

    <script>
        const detailPage = document.getElementById('detailPage');

        function openPage() {
            detailPage.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closePage() {
            detailPage.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        detailPage.addEventListener('click', function(e) {
            if(e.target === detailPage) {
                closePage();
            }
        });
    </script>
