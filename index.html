<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The House Escape: Shock</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #game-container {
            position: relative;
            width: 1000px; /* Resmin oranına göre ayarlandı */
            height: 500px;
            /* RESMİ BURADA ARKA PLAN YAPIYORUZ */
            background-image: url('background.png'); 
            background-size: cover;
            background-position: center;
            border: 2px solid #111;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5; /* Karakterin resmin önünde görünmesi için */
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Karakteri ve hareketli objeleri buraya çizeceğiz -->
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1000;
    canvas.height = 500;

    // Şimdilik sadece boş bir döngü, karakteri eklemeye hazır
    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Buraya ileride "Burak" karakterini çizen kodu ekleyeceğiz
        
        requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
