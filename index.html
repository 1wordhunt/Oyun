<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLOW UP: Neon Alpha</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #050505; overflow: hidden; font-family: 'Rajdhani', sans-serif; color: #fff; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; padding: 15px; display: flex; flex-direction: column;
        }
        
        /* Neon UI Elements */
        .hud-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            text-shadow: 0 0 10px #0ff;
        }
        .dev-badge {
            background: linear-gradient(90deg, rgba(0,242,254,0.2), transparent);
            border-left: 4px solid #0ff; padding: 5px 15px; font-family: 'Orbitron', sans-serif;
            font-size: 14px; letter-spacing: 2px; color: #0ff; text-transform: uppercase;
        }
        
        .score-board { text-align: right; }
        .score-val { font-size: 32px; font-family: 'Orbitron', sans-serif; color: #fff; text-shadow: 0 0 15px #f0f; }
        .rank-val { font-size: 18px; color: #cd7f32; text-shadow: 0 0 10px #cd7f32; text-transform: uppercase; margin-top: -5px; }

        /* Power Bar */
        .power-container {
            width: 200px; height: 15px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(0, 255, 255, 0.3); border-radius: 10px; margin-top: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2); overflow: hidden; position: relative;
        }
        .power-fill {
            height: 100%; width: 50%; background: linear-gradient(90deg, #00f2fe, #4facfe);
            box-shadow: 0 0 20px #0ff; transition: width 0.3s ease;
        }
        .bar-label {
            position: absolute; top: -18px; left: 0; font-size: 12px; color: #0ff; letter-spacing: 1px;
        }

        /* Screens */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(10,0,30,0.8) 0%, #000 100%);
            backdrop-filter: blur(5px); display: flex; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: all; z-index: 20;
            transition: opacity 0.5s;
        }
        .hidden { opacity: 0; pointer-events: none; }
        
        .title {
            font-family: 'Orbitron', sans-serif; font-size: 45px; text-align: center; line-height: 1.1;
            background: linear-gradient(to right, #0ff, #f0f); -webkit-background-clip: text; color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,0,255,0.5)); margin-bottom: 10px;
        }
        .subtitle { color: #aaa; font-size: 16px; margin-bottom: 40px; text-align: center; max-width: 80%; }
        
        .neon-btn {
            background: transparent; border: 2px solid #0ff; color: #0ff;
            padding: 15px 40px; font-size: 20px; font-family: 'Orbitron', sans-serif;
            text-transform: uppercase; cursor: pointer; border-radius: 5px;
            box-shadow: 0 0 15px inset rgba(0,255,255,0.3), 0 0 20px rgba(0,255,255,0.5);
            transition: all 0.2s; position: relative; overflow: hidden;
        }
        .neon-btn:active { transform: scale(0.95); box-shadow: 0 0 30px inset rgba(0,255,255,0.8), 0 0 40px #0ff; background: rgba(0,255,255,0.2); }
        .btn-ad { border-color: #f0f; color: #f0f; box-shadow: 0 0 15px inset rgba(255,0,255,0.3), 0 0 20px rgba(255,0,255,0.5); margin-bottom: 15px; }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="hud-header">
            <div class="dev-badge">Developer Burak</div>
            <div class="score-board">
                <div class="score-val" id="score">0</div>
                <div class="rank-val" id="rank">Çaylak Bronz</div>
            </div>
        </div>
        <div style="position: relative; margin-top: 25px;">
            <div class="bar-label">GLOW UP METRESİ (GÜÇ)</div>
            <div class="power-container"><div class="power-fill" id="health"></div></div>
        </div>
    </div>

    <div id="start-screen" class="screen">
        <div class="title">GLOW UP<br>RUN</div>
        <div class="subtitle">Milyon dolarlık vizyon. NPC'leri ez geç, demirleri ağlat!<br><br>👉 EKRANA DOKUNARAK SAĞA/SOLA KAY</div>
        <button class="neon-btn" onclick="startGame()">Sistemi Başlat</button>
    </div>

    <div id="game-over" class="screen hidden">
        <div class="title" style="font-size: 35px; color: #f00;">SİSTEM ÇÖKTÜ</div>
        <div class="subtitle" id="death-reason" style="color: #ff4a4a;">Zehirli eski alışkanlıklara yakalandın!</div>
        <div style="font-size: 24px; color: #0ff; margin-bottom: 30px; font-family: 'Orbitron';">XP: <span id="final-score">0</span></div>
        <button class="neon-btn btn-ad" onclick="watchAd()">🎬 Reklam İzle & Diril</button>
        <button class="neon-btn" style="font-size: 16px; padding: 10px 30px;" onclick="startGame()">Yeniden Dene</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const uiScore = document.getElementById('score');
    const uiRank = document.getElementById('rank');
    const uiHealth = document.getElementById('health');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over');
    
    let W, H;
    let gameLoop;
    let frame = 0;
    
    // Game Variables
    let state = 'MENU'; // MENU, PLAY, OVER
    let score = 0;
    let health = 50;
    let speed = 8;
    let lane = 1; // 0=Left, 1=Center, 2=Right
    
    // Entities
    let player = { x: 0, y: 0, targetX: 0 };
    let obstacles = [];
    let particles = [];
    let gridOffset = 0;

    // Resize Canvas
    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        player.y = H - 150;
        updateLane();
    }
    window.addEventListener('resize', resize);
    resize();

    // Input Handling
    window.addEventListener('touchstart', handleInput);
    window.addEventListener('mousedown', handleInput);
    window.addEventListener('keydown', (e) => {
        if(state !== 'PLAY') return;
        if(e.key === 'ArrowLeft' && lane > 0) lane--;
        if(e.key === 'ArrowRight' && lane < 2) lane++;
        updateLane();
    });

    function handleInput(e) {
        if(state !== 'PLAY') return;
        let x = e.clientX || (e.touches && e.touches[0].clientX);
        if(x < W/2 && lane > 0) lane--;
        if(x >= W/2 && lane < 2) lane++;
        updateLane();
    }

    function updateLane() {
        let laneWidth = W / 3;
        player.targetX = (lane * laneWidth) + (laneWidth / 2);
    }

    // Rank Logic (Çaylak Bronz to Elit Kırmızı)
    function checkRank() {
        let r = "Çaylak Bronz", c = "#cd7f32";
        if(score > 200) { r = "Demir Gri"; c = "#aaaaaa"; }
        if(score > 500) { r = "Altın Sarı"; c = "#ffd700"; }
        if(score > 1000) { r = "Elmas Mavi"; c = "#00f2fe"; }
        if(score > 2000) { r = "Elit Kırmızı"; c = "#ff0055"; speed = 12; } // Speed boost!
        
        uiRank.innerText = r;
        uiRank.style.color = c;
        uiRank.style.textShadow = `0 0 10px ${c}`;
    }

    // Create Explosion
    function explode(x, y, color) {
        for(let i=0; i<15; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15,
                life: 1, color: color
            });
        }
    }

    // Game Core
    function startGame() {
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        score = 0; health = 50; speed = 8; lane = 1;
        obstacles = []; particles = [];
        updateLane();
        player.x = player.targetX;
        state = 'PLAY';
        uiHealth.style.width = health + '%';
        checkRank();
    }

    function watchAd() {
        // Pseudo-Ad logic
        alert("💰 Dolar Simülasyonu: Amerika'dan reklam izlendi. +1.50$ hesabına eklendi!");
        gameOverScreen.classList.add('hidden');
        health = 100; obstacles = []; // Clear screen
        state = 'PLAY';
    }

    function die(reason) {
        state = 'OVER';
        gameOverScreen.classList.remove('hidden');
        document.getElementById('death-reason').innerText = reason;
        document.getElementById('final-score').innerText = score;
    }

    // Main Update & Draw Loop
    function loop() {
        requestAnimationFrame(loop);
        
        // 1. Draw Background (Synthwave Sky & Floor)
        let skyGradient = ctx.createLinearGradient(0, 0, 0, H/2);
        skyGradient.addColorStop(0, '#0a0a1a');
        skyGradient.addColorStop(1, '#2b003b');
        ctx.fillStyle = skyGradient;
        ctx.fillRect(0, 0, W, H);
        
        // Sun
        ctx.beginPath();
        ctx.arc(W/2, H/2, 60, 0, Math.PI*2);
        ctx.fillStyle = '#ff0055';
        ctx.shadowBlur = 50; ctx.shadowColor = '#ff0055';
        ctx.fill(); ctx.shadowBlur = 0;

        // Synthwave Moving Grid (Pseudo 3D)
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
        ctx.lineWidth = 2;
        gridOffset = (gridOffset + speed) % 50;
        
        ctx.beginPath();
        // Horizontal lines
        for(let i=0; i<H/2; i+=50) {
            let y = H/2 + i + (gridOffset * (i/100));
            ctx.moveTo(0, y); ctx.lineTo(W, y);
        }
        // Vertical lines
        let center = W/2;
        for(let i=-5; i<=5; i++) {
            ctx.moveTo(center, H/2);
            ctx.lineTo(center + (i*150), H);
        }
        ctx.stroke();

        if(state !== 'PLAY') return;
        frame++;

        // Smooth player movement
        player.x += (player.targetX - player.x) * 0.2;

        // Spawn Entities
        if(frame % Math.max(20, 45 - Math.floor(speed)) === 0) {
            let l = Math.floor(Math.random() * 3);
            let type = Math.random() > 0.4 ? 'good' : 'bad';
            
            // Good: Yumurta/Su/Kemik Suyu -- Bad: Sigara/Cips/Wax
            let emoji = type === 'good' ? ['🥚','🥣','💎'][Math.floor(Math.random()*3)] : ['🚬','🥔','🧴'][Math.floor(Math.random()*3)];
            let color = type === 'good' ? '#00f2fe' : '#ff0055';

            obstacles.push({
                x: (l * (W/3)) + (W/6), y: H/2, z: 0.1, // z is for pseudo 3d scaling
                type: type, emoji: emoji, color: color, lane: l
            });
        }

        // Update & Draw Entities
        for(let i = obstacles.length-1; i>=0; i--) {
            let o = obstacles[i];
            o.y += speed * o.z * 5; // move down
            o.z += 0.02; // grow in size
            o.x = (o.lane * (W/3)) + (W/6); // keep in lane

            // Draw Item
            ctx.font = Math.floor(30 * o.z) + "px Arial";
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.shadowBlur = 20; ctx.shadowColor = o.color;
            ctx.fillText(o.emoji, o.x, o.y);
            ctx.shadowBlur = 0;

            // Collision Detection
            if(o.y > player.y - 30 && o.y < player.y + 30 && Math.abs(o.x - player.x) < W/6) {
                explode(o.x, o.y, o.color);
                
                if(o.type === 'good') {
                    score += 15; health = Math.min(100, health + 5);
                } else {
                    health -= 25; // Massive damage for junk
                    if(health <= 0) die("Toksinler ve ödem seni yavaşlattı!");
                }
                
                uiScore.innerText = score;
                uiHealth.style.width = health + '%';
                checkRank();
                obstacles.splice(i, 1);
                continue;
            }

            // Remove off-screen
            if(o.y > H + 50) obstacles.splice(i, 1);
        }

        // Update & Draw Particles
        for(let i = particles.length-1; i>=0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy; p.life -= 0.05;
            if(p.life <= 0) { particles.splice(i, 1); continue; }
            
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1.0;
        }

        // Draw Player (Neon Cyber-Jet / Avatar)
        ctx.save();
        ctx.translate(player.x, player.y);
        
        // Trail effect
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(-15, 60); ctx.lineTo(15, 60);
        ctx.fillStyle = 'rgba(0, 242, 254, 0.3)';
        ctx.fill();

        // Ship / Player Body
        ctx.beginPath();
        ctx.moveTo(0, -25); // Nose
        ctx.lineTo(20, 20); // Right Wing
        ctx.lineTo(0, 10);  // Center Engine
        ctx.lineTo(-20, 20); // Left Wing
        ctx.closePath();
        
        ctx.fillStyle = '#050505';
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#00f2fe';
        ctx.shadowBlur = 20; ctx.shadowColor = '#00f2fe';
        ctx.stroke();
        
        // Engine Glow
        ctx.beginPath(); ctx.arc(0, 15, 8 + Math.random()*4, 0, Math.PI*2);
        ctx.fillStyle = '#f0f'; ctx.shadowColor = '#f0f'; ctx.fill();
        
        ctx.restore();
    }

    // Start Engine
    requestAnimationFrame(loop);
</script>
</body>
</html>
